test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# ─────────────────────────────────────────────
# Cloudflare R2  (S3-compatible)
#
# Variáveis de ambiente necessárias:
#   CLOUDFLARE_R2_ACCESS_KEY_ID      → R2 → Manage R2 API Tokens → Access Key ID
#   CLOUDFLARE_R2_SECRET_ACCESS_KEY  → R2 → Manage R2 API Tokens → Secret Access Key
#   CLOUDFLARE_R2_BUCKET             → nome do bucket criado no R2
#   CLOUDFLARE_ACCOUNT_ID            → ID da conta (aparece no dashboard do R2)
#
# Endpoint S3 do R2:
#   https://<ACCOUNT_ID>.r2.cloudflarestorage.com
# ─────────────────────────────────────────────
cloudflare_r2:
  service: S3
  access_key_id: <%= ENV["CLOUDFLARE_R2_ACCESS_KEY_ID"].to_s.gsub(/\A['\"]|['\"]\z/, "") %>
  secret_access_key: <%= ENV["CLOUDFLARE_R2_SECRET_ACCESS_KEY"].to_s.gsub(/\A['\"]|['\"]\z/, "") %>
  region: auto
  bucket: <%= ENV["CLOUDFLARE_R2_BUCKET"].to_s.gsub(/\A['\"]|['\"]\z/, "") %>
  endpoint: https://<%= ENV["CLOUDFLARE_ACCOUNT_ID"].to_s.gsub(/\A['\"]|['\"]\z/, "") %>.r2.cloudflarestorage.com
  force_path_style: true
